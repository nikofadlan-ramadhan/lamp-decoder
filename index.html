<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>ICODE Universal Decoder</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>

/* niko */

body{
font-family:"JetBrains Mono",monospace;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:#e8fdf5;
padding:30px;
}

h2{
text-align:center;
color:#9fffd8;
}

textarea{
width:100%;
height:140px;
background:#0b0f14;
border:1px solid #1e3a3a;
border-radius:10px;
color:#8affc1;
padding:12px;
outline:none;
}

textarea.drag{
border:2px dashed #00ffa6;
background:#061010;
}

button{
margin-top:15px;
padding:10px 24px;
border:none;
border-radius:8px;
cursor:pointer;
background:linear-gradient(135deg,#00ffa6,#00c3ff);
font-weight:600;
}

table{
border-collapse:collapse;
width:100%;
margin-top:25px;
background:#0b0f14;
border-radius:10px;
overflow:hidden;
}

th{
background:linear-gradient(135deg,#00ffa6,#00c3ff);
color:#002;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #1c2c2c;
}

tr:hover{
background:#111c1c;
}

.ok{
color:#2aff9b;
font-weight:600;
}

.err{
color:#ff5c5c;
font-weight:600;
}

footer{
margin-top:30px;
text-align:center;
color:#6fffd2;
}

/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(8px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes glow{
0%{box-shadow:0 0 5px #00ffa6;}
50%{box-shadow:0 0 15px #00ffa6;}
100%{box-shadow:0 0 5px #00ffa6;}
}

/* table animation */

#result tr{
animation:fadeIn .50s ease forwards;
}

/* textarea focus */

textarea:focus{
box-shadow:0 0 10px rgba(0,255,170,0.5);
}

/* button animation */

button:hover{
animation:glow 1s infinite;
transform:translateY(-1px);
}

/* row hover smooth */

tr{
transition:all .2s ease;
}
</style>

</head>

<body>

<h2>ICODE Universal Decoder</h2>

<textarea id="hexInput"></textarea>

<br>

<button onclick="parse()">Decode</button>

<table id="result">

<tr>
<th>Field</th>
<th>Hex</th>
<th>Value</th>
</tr>

</table>

<footer>HEX TO DECIMAL</footer>

<script>

let dateOverflow=false;

/* BASIC */

function hexToInt(hex){
return parseInt(hex,16);
}

function hexToSigned32(hex){

let v=parseInt(hex,16);

if(v>0x7FFFFFFF)
v-=0x100000000;

return v;
}

/* CRC16 MODBUS */

function calcCRC16(bytes){

let crc=0xFFFF;

for(let b of bytes){

crc^=parseInt(b,16);

for(let i=0;i<8;i++){

if(crc&1)
crc=(crc>>1)^0xA001;
else
crc>>=1;

}

}

let hex=crc.toString(16).padStart(4,'0');

let low=hex.slice(2,4);
let high=hex.slice(0,2);

return (low+high).toLowerCase();

}

/* BCD */

function bcdDecode(bytes){

let out="";

for(let b of bytes){

let v=parseInt(b,16);

let high=(v>>4)&0xF;
let low=v&0xF;

out+=high.toString();
out+=low.toString();

}

return out;

}

/* TIME */

function formatTimeUTC7(hex){

let ss=parseInt(hex.slice(0,2),16);
let mm=parseInt(hex.slice(2,4),16);
let hh=parseInt(hex.slice(4,6),16);

hh+=7;

if(hh>=24){
hh-=24;
dateOverflow=true;
}else
dateOverflow=false;

return `${hh.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}:${ss.toString().padStart(2,'0')}`;

}

function formatDateWithOverflow(hex){

let dd=parseInt(hex.slice(0,2),16);
let mm=parseInt(hex.slice(2,4),16);
let yy=parseInt(hex.slice(4,6),16);

if(dateOverflow)dd++;

return `${dd.toString().padStart(2,'0')}/${mm.toString().padStart(2,'0')}/20${yy}`;

}

/* TABLE */

function clearTable(){

document.getElementById("result").innerHTML=`

<tr>
<th>Field</th>
<th>Hex</th>
<th>Value</th>
</tr>`;

}

function row(name,hex,val,cls=""){

let r=document.getElementById("result").insertRow();

r.style.animation="fadeIn .25s ease";

r.insertCell(0).innerText=name;
r.insertCell(1).innerText="0x"+hex;

let v=r.insertCell(2);
v.innerText=val;

if(cls)v.className=cls;

}

/* PARSER */

function parse(){

document.getElementById("result").style.opacity="0";

setTimeout(()=>{
document.getElementById("result").style.opacity="1";
},50);

let hexRaw=document
.getElementById("hexInput")
.value.replace(/\s/g,'');

let bytes=hexRaw.match(/.{1,2}/g);

if(!bytes){
alert("Invalid HEX");
return;
}

clearTable();

/* AUTO DETECT FRAME */

if(bytes[0]=="aa" && bytes[1]=="55"){
decodeAA55(bytes);
return;
}

if(bytes[0]=="26"){
decode26(bytes);
return;
}

decodeICODE(bytes);

}

/* AA55 FRAME */

function decodeAA55(b){

row("Frame Head",b[0]+b[1],"AA55");

row("Length",
b[2]+b[3],
hexToInt(b[2]+b[3])+" bytes");

// let frameLen = hexToInt(b[2]+b[3]);

// if(b.length !== frameLen){
// row(
// "Length Check",
// b.length,
// "Frame size mismatch",
// "err"
// );
// }else{
// row(
// "Length Check",
// b.length,
// "Frame size OK",
// "ok"
// );
// }

let frameLen = hexToInt(b[2]+b[3]);

let payloadLength = b.length - 10;

if(payloadLength !== frameLen){

row(
"Length Check",
payloadLength,
"Frame size mismatch",
"err"
);

}else{

row(
"Length Check",
payloadLength,
"Frame size OK",
"ok"
);

}

row("Version",b[4],b[4]);
row("Encrypt",b[5],b[5]);
row("Type",b[6],b[6]);
row("Reserved",b[7],b[7]);

let crcFrame=(b[8]+b[9]).toLowerCase();

let crcCalc=calcCRC16(b.slice(10));

let status=(crcFrame===crcCalc)?"OK":"ERROR";

row(
"CRC16",
crcFrame,
"Calc 0x"+crcCalc+" = "+status,
status==="OK"?"ok":"err"
);

row("Address",
b.slice(10,14).join(""),
hexToInt(b.slice(10,14).join("")));

row("Function Code",b[14],"0xD0");

row("Serial",b[15],b[15]);

row("IMEI",
b.slice(16,24).join(""),
bcdDecode(b.slice(16,24)));

row("Serial",b[24],"08");

row("IMSI",
b.slice(25,33).join(""),
bcdDecode(b.slice(25,33)));

row("Serial",b[33],"03");

row("CSQ",b[34],hexToInt(b[34]));

row("Serial",b[35],"05");

row("PCI",b[36],hexToInt(b[36]));

row("Serial",b[37],"09");

row("FW Version",
b[38]+b[39]+b[40],
hexToInt(b[38])+"."+hexToInt(b[39])+"."+hexToInt(b[40]));

row("Timezone",b[41],"UTC+"+hexToInt(b[41]));

}

/* ICODE FRAME */

function decodeICODE(bytes){

row("Frame head",bytes[0],"Start Frame");

row("Length",bytes[1],hexToInt(bytes[1]));

row("Address",
bytes.slice(2,6).join(""),
hexToInt(bytes.slice(2,6).join("")));

row("Dimming port",bytes[6],"04");
row("Dimming function",bytes[7],"10");

row("Dimming value",
bytes[8],
hexToInt(bytes[8])+" %");

row("Turn port",bytes[9],"05");
row("Turn function",bytes[10],"04");

row("Turn status",
bytes[11],
bytes[11]=="00"?"ON":"OFF");

row("Collection port",bytes[12],"00");
row("Collection function",bytes[13],"20");
row("Effective length",bytes[14],"0C");

row("Voltage",
bytes.slice(15,17).join(""),
hexToInt(bytes.slice(15,17).join(""))/100+" V");

row("Current",
bytes.slice(17,19).join(""),
hexToInt(bytes.slice(17,19).join(""))/1000+" A");

row("Active Power",
bytes.slice(19,21).join(""),
hexToInt(bytes.slice(19,21).join(""))/10+" W");

row("Reactive Power",
bytes.slice(21,23).join(""),
hexToInt(bytes.slice(21,23).join(""))/10+" VAR");

row("Frequency",
bytes.slice(23,25).join(""),
hexToInt(bytes.slice(23,25).join(""))/100+" Hz");

row("Active Energy",
bytes.slice(25,29).join(""),
hexToInt(bytes.slice(25,29).join(""))/100+" kWh");

let tempHex=bytes.slice(29,31).join("");

let temp=(hexToInt(tempHex)-10000)/100;

row("Temperature",tempHex,temp+" °C");

let timeHex=bytes.slice(31,34).join("");

row("Time",timeHex,formatTimeUTC7(timeHex));

let dateHex=bytes.slice(34,37).join("");

row("Date",dateHex,formatDateWithOverflow(dateHex));

let idx=37;

function get4(name,signed=false){

let hex=bytes.slice(idx,idx+4).join("");

let val=signed?
hexToSigned32(hex):
hexToInt(hex);

row(name,hex,val);

idx+=4;

}

get4("Signal Power",true);
get4("Total Power",true);
get4("Tx Power",true);
//get4("Rx Power",true);
get4("Tx Time");
get4("Rx Time");
get4("Cell ID");
get4("ECL");
get4("SNR",true);
get4("Earfcn");
get4("PCI");
get4("RSRQ",true);

row("Device Working Times",
bytes.slice(bytes.length-8,bytes.length-4).join(""),
hexToInt(bytes.slice(bytes.length-8,bytes.length-4).join(""))+" min");

row("Restart Times",
bytes.slice(bytes.length-4,bytes.length-2).join(""),
hexToInt(bytes.slice(bytes.length-4,bytes.length-2).join("")));

let crcFrame=bytes.slice(bytes.length-2).join("").toLowerCase();

let crcCalc=calcCRC16(bytes.slice(0,bytes.length-2));

let status=(crcFrame===crcCalc)?"OK":"ERROR";

row("CRC16",
crcFrame,
"Calc 0x"+crcCalc+" = "+status,
status==="OK"?"ok":"err");

}

function decode26(bytes){

row("Frame head",bytes[0],"Start Frame");

row("Length",bytes[1],hexToInt(bytes[1])+" bytes");


row("Device Address",
bytes.slice(2,6).join(""),
hexToInt(bytes.slice(2,6).join("")));


row("Device Working Time",
bytes.slice(6,10).join(""),
hexToInt(bytes.slice(6,10).join(""))+" min");


row("Restart Times",
bytes.slice(10,12).join(""),
hexToInt(bytes.slice(10,12).join("")));


row("Active Energy",
bytes.slice(12,16).join(""),
hexToInt(bytes.slice(12,16).join(""))/100+" kWh");


row("Reactive Power",
bytes.slice(16,20).join(""),
hexToInt(bytes.slice(16,20).join(""))/100+" VAR");


row("Apparent Power",
bytes.slice(20,24).join(""),
hexToInt(bytes.slice(20,24).join(""))/100+" VA");


/* CRC */

let crcFrame=
bytes.slice(bytes.length-2).join("").toLowerCase();

let crcCalc=
calcCRC16(bytes.slice(0,bytes.length-2));

let status=(crcFrame===crcCalc)?"OK":"ERROR";

row(
"CRC16",
crcFrame,
"Calc 0x"+crcCalc+" = "+status,
status==="OK"?"ok":"err"
);

}

/* UX FEATURES */

const hexBox=document.getElementById("hexInput");

hexBox.addEventListener("focus",()=>{
if(hexBox.value.length>0)
hexBox.select();
});

hexBox.addEventListener("paste",e=>{
e.preventDefault();
let text=(e.clipboardData||window.clipboardData).getData("text");
hexBox.value=text.replace(/\s/g,'');
parse();
});

hexBox.addEventListener("dragover",e=>{
e.preventDefault();
hexBox.classList.add("drag");
});

hexBox.addEventListener("dragleave",()=>{
hexBox.classList.remove("drag");
});

hexBox.addEventListener("drop",e=>{
e.preventDefault();
hexBox.classList.remove("drag");

let text=e.dataTransfer.getData("text");

if(text){
hexBox.value=text.replace(/\s/g,'');
parse();
}

});

</script>

</body>
</html>
